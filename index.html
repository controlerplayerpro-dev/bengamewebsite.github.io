<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Dashboard</title>
    <style>
        body { background-color: #111; color: #fff; font-family: monospace; text-align: center; margin: 0; padding: 20px; }
        h1 { margin-bottom: 10px; color: #00ffcc; }
        #score-board { font-size: 20px; margin-bottom: 20px; }
        canvas { background-color: #222; border: 4px solid #00ffcc; box-shadow: 0 0 20px #00ffcc; display: block; margin: 0 auto; }
        .controls { margin-top: 15px; color: #888; font-size: 14px; }
    </style>
</head>
<body>

    <h1>RETRO SNAKE</h1>
    <div id="score-board">SCORE: <span id="score">0</span></div>
    
    <!-- This is the game window screen -->
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div class="controls">Use the ARROW KEYS on your keyboard to move.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const grid = 20;
        let count = 0;
        let score = 0;
        
        let snake = { x: 160, y: 160, dx: grid, dy: 0, cells: [{x: 160, y: 160}, {x: 140, y: 160}], maxCells: 4 };
        let apple = { x: 320, y: 320 };

        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min)) + min; }

        function gameLoop() {
            requestAnimationFrame(gameLoop);
            if (++count < 6) { return; } // Controls game speed (higher = slower)
            count = 0;
            ctx.clearRect(0,0,canvas.width,canvas.height);

            snake.x += snake.dx;
            snake.y += snake.dy;

            // Wall collisions (wraps snake around screen edges)
            if (snake.x < 0) snake.x = canvas.width - grid;
            else if (snake.x >= canvas.width) snake.x = 0;
            if (snake.y < 0) snake.y = canvas.height - grid;
            else if (snake.y >= canvas.height) snake.y = 0;

            snake.cells.unshift({x: snake.x, y: snake.y});
            if (snake.cells.length > snake.maxCells) { snake.cells.pop(); }

            // Draw Apple
            ctx.fillStyle = '#ff5555';
            ctx.fillRect(apple.x, apple.y, grid-1, grid-1);

            // Draw Snake
            ctx.fillStyle = '#00ffcc';
            snake.cells.forEach(function(cell, index) {
                ctx.fillRect(cell.x, cell.y, grid-1, grid-1);  
                
                // Snake eats apple
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score += 10;
                    document.getElementById('score').innerText = score;
                    apple.x = getRandomInt(0, 20) * grid;
                    apple.y = getRandomInt(0, 20) * grid;
                }
                
                // Check collision with self
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        // Game Over reset
                        snake.x = 160; snake.y = 160;
                        snake.cells = [{x: 160, y: 160}, {x: 140, y: 160}];
                        snake.maxCells = 4; snake.dx = grid; snake.dy = 0;
                        score = 0;
                        document.getElementById('score').innerText = score;
                    }
                }
            });
        }

        // Listen for keyboard input
        document.addEventListener('keydown', function(e) {
            if (e.which === 37 && snake.dx === 0) { snake.dx = -grid; snake.dy = 0; } // Left
            else if (e.which === 38 && snake.dy === 0) { snake.dy = -grid; snake.dx = 0; } // Up
            else if (e.which === 39 && snake.dx === 0) { snake.dx = grid; snake.dy = 0; } // Right
            else if (e.which === 40 && snake.dy === 0) { snake.dy = grid; snake.dx = 0; } // Down
        });

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
